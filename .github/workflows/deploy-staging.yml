name: Build Nitro SSR (test)

on:
  push:
    branches:
      - test
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SSR artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.19.0'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build Nitro server
        run: npm run build
      - name: Verify Nitro server output
        run: test -f .output/server/index.mjs
      - name: Archive SSR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nitro-ssr-test-${{ github.sha }}
          path: .output
          retention-days: 7
