name: Build Nitro SSR (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SSR artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          submodules: false
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.19.0'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build Nitro server
        run: npm run build
      - name: Verify Nitro server output
        run: test -f .output/server/index.mjs
      - name: Archive SSR artifact
        uses: actions/upload-artifact@v7
        with:
          name: nitro-ssr-main-${{ github.sha }}
          path: .output
          include-hidden-files: true
          retention-days: 7
